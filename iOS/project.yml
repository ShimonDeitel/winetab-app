name: Winetab
options:
  bundleIdPrefix: com.shimondeitel.winetab
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Winetab:
    type: application
    platform: iOS
    sources:
      - path: Winetab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.winetab
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Winetab/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WinetabTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WinetabTests
      - path: Winetab.storekit
    dependencies:
      - target: Winetab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.winetab.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WinetabUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WinetabUITests
    dependencies:
      - target: Winetab
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.winetab.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Winetab:
    build:
      targets:
        Winetab: all
        WinetabTests: [test]
        WinetabUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Winetab.storekit
    test:
      config: Debug
      storeKitConfiguration: Winetab.storekit
      targets:
        - WinetabTests
        - WinetabUITests
    archive:
      config: Release
